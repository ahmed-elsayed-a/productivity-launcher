name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"        # normal path: create a tag/release on github.com and this fires
  workflow_dispatch:      # manual path: "Run workflow" button in the Actions tab, no tag needed

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil pygetwindow pillow pyinstaller

      - name: Build ProductivityLauncher.exe
        run: |
          if (Test-Path "icon.ico") {
            pyinstaller --onefile --windowed --name ProductivityLauncher --icon=icon.ico launcher.py
          } else {
            pyinstaller --onefile --windowed --name ProductivityLauncher launcher.py
          }

      - name: Generate SHA-256 checksum
        run: |
          certutil -hashfile dist\ProductivityLauncher.exe SHA256 > dist\ProductivityLauncher.exe.sha256.txt

      # --- Path A: this was triggered by a version tag -> publish/attach to the Release ---
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ProductivityLauncher.exe
            dist/ProductivityLauncher.exe.sha256.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Path B: manual test run -> just save as a downloadable build artifact ---
      - name: Upload test build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ProductivityLauncher-test-build
          path: |
            dist/ProductivityLauncher.exe
            dist/ProductivityLauncher.exe.sha256.txt
